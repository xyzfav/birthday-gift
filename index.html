<!DOCTYPE html>  
<html>  
<head>  
<meta charset="UTF-8">  
<title>For You ❤️</title>  
  
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">  
  
<style>  
body{  
  margin:0;  
  min-height:100vh;  
  background:#dbe4f0;  
  background-image:  
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.5) 2px, transparent 2px),  
    radial-gradient(circle at 80% 70%, rgba(255,255,255,.4) 2px, transparent 2px);  
  overflow-x:hidden;  
  font-family:'Quicksand',sans-serif;  
}  
  
.envelope{
  width:85vw;
  max-width:420px;
  height:320px;
  margin:18vh auto;
  background:linear-gradient(
      145deg,
      #3f5fa3,
      #27437d,
      #1e3363
  );
  border-radius:28px;
  box-shadow:0 15px 30px rgba(0,0,0,.15);
  position:relative;
  overflow:hidden;
  cursor:pointer;
}
  
.envelope::before{  
  content:"✦";  
  position:absolute;  
  top:25px;  
  left:30px;  
  color:rgba(255,255,255,.45);  
  font-size:22px;  
}  
  
.envelope::after{  
  content:"✦";  
  position:absolute;  
  bottom:25px;  
  right:30px;  
  color:rgba(255,255,255,.45);  
  font-size:22px;  
}  
  
.flap{  
  position:absolute;  
  width:100%;  
  height:55%;  
  background:linear-gradient(  
      180deg,  
      #4a6ab0,  
      #2b467f  
  );  
  clip-path:polygon(0 0,100% 0,50% 100%);  
  top:0;  
  left:0;  
  transform-origin:top;  
  transition:1s;  
  z-index:3;  
}  
  
.seal{  
  position:absolute;  
  width:55px;  
  height:55px;  
  background:linear-gradient(  
      145deg,  
      #f7e7a4,  
      #d8b76a,  
      #b88a44  
  );  
  border-radius:50%;  
  left:50%;  
  top:38%;  
  transform:translate(-50%,-50%);  
  display:flex;  
  justify-content:center;  
  align-items:center;  
  color:#6b4f1f;  
  font-size:16px;  
  font-family:'Cormorant Garamond',serif;  
  font-weight:700;  
  z-index:4;  
  box-shadow:  
      inset 0 3px 6px rgba(255,255,255,.5),  
      0 8px 15px rgba(0,0,0,.2);  
}  
  
.letter{  
  position:absolute;  
  width:72%;  
  height:75%;  
  background:linear-gradient(  
      180deg,  
      #faf4e6,  
      #f2e4c8  
  );  
  border-radius:12px;  
  left:10%;  
  top:12%;  
  display:flex;  
  justify-content:center;  
  align-items:center;  
  text-align:center;  
  border:2px solid #d7c2a0;  
  transition:1.2s;  
  
  display:flex;  
  justify-content:flex-end;  
  align-items:center;  
  flex-direction:column;  
  padding-bottom:25px;  
  box-sizing:border-box;  
}  
  
.letter h2{  
  font-family:'Cormorant Garamond',serif;  
  font-size:42px;  
  color:#443322;  
  margin-bottom:10px;  
}  
  
.letter p{  
  color:#8b7761;  
  font-size:18px;  
}  
  
.letter div{  
  margin-top:45px;  
}  
  
.open .flap{  
  transform:rotateX(180deg);  
}  
  
.open .letter{  
  transform:translateY(-200px);  
}  
  
#message{  
  display:none;  
  width:88vw;  
  min-height:75vh;  
  margin:30px auto;  
  padding:45px 25px;  
  background:linear-gradient(  
      180deg,  
      #faf4e8,  
      #f3e6cf  
  );  
  border-radius:35px;  
  box-shadow:0 15px 35px rgba(0,0,0,.15);  
  text-align:center;  
}  
  
h1{  
  font-family:'Cormorant Garamond',serif;  
  color:#4b3b2b;  
  font-size:52px;  
}  
  
#message p{  
  line-height:1.9;  
  color:#5e4c3c;  
  font-size:18px;  
  font-style:italic;  
  font-family:'Cormorant Garamond', serif;  
  letter-spacing:0.5px;  
}  
  
.hanging-photo{  
  width:95%;  
  max-width:520px;  
  margin:50px auto;  
}  
  
.string{  
  width:2px;  
  height:70px;  
  background:#b89b72;  
  margin:auto;  
}  
  
.polaroid{  
  width:100%;  
  border:none;  
  border-radius:25px;  
  box-shadow:0 15px 30px rgba(0,0,0,.2);  
  display:block; 
  object-fit:cover;
}  
  
.flower{  
  position:fixed;  
  top:-50px;  
  pointer-events:none;  
  z-index:9999;  
  animation:fall linear forwards;  
}  
  
@keyframes fall{  
  from{  
    transform:translateY(-50px) rotate(0);  
    opacity:1;  
  }  
  to{  
    transform:translateY(120vh) rotate(360deg);  
    opacity:0;  
  }  
}  
  
@media(max-width:600px){  
  h1{  
    font-size:42px;  
  }  
  
  .letter h2{  
    font-size:30px;  
  }  
  
  #message p{  
    font-size:16px;  
  }  
}  
.birthday-date{  
  margin-top:-20px;  
  color:#9c8768;  
  font-style:italic;  
  font-size:18px;  
}  

#countdown{
  position:fixed;
  inset:0;
  background:#dbe4f0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:90px;
  color:#27437d;
  font-family:'Cormorant Garamond', serif;
  z-index:99999;
}

</style>  
</head>  
  
<body>

<div id="countdown">3</div>  
  
<div class="envelope" onclick="openLetter()">  
  <div class="flap"></div>  
  
  <div class="seal">F</div>  
  
  <div class="letter">  
    <div>  
      <h2>Dear David Toga</h2>  
      <p>Open your letter ✨</p>  
    </div>  
  </div>  
</div>  
  
<div id="message">  
  <h1>Happy Birthday, My Love 🤎</h1>  
  
  <p class="birthday-date">15 July 2026 ✨</p>  
  
<p id="letterText"></p>  
  
  <div class="hanging-photo">  
    <div class="string"></div>  
    <img src="Untitled design.PNG" class="polaroid">  
  </div>  
</div>  
  
<audio id="music" loop>  
  <source src="Backstreet Boys - Shape Of My Heart (Official HD Video).mp3" type="audio/mpeg">  
</audio>  
  
<script>  
let opened = false;  
  
function openLetter(){  
  if(opened) return;  
  
  opened = true;  
  
  document.querySelector(".envelope").classList.add("open");  
  createFlowers();  
  
  document.getElementById("music").play();  
  
  setTimeout(() => {  
    document.getElementById("message").style.display = "block";  
    typeLetter();  
  }, 2500);  
  
  setTimeout(() => {  
    document.querySelector(".envelope").remove();  
  }, 3000);  
}  
  
const text = `Hi Sayangkuuu...  
  
Semoga di usia yang baru ini kamu selalu sehat,  
bahagia, dijauhkan dari orang jahat dan didekatkan sama orang-orang yang baik.  
  
Semoga tahun ini dan seterusnya semua impianmu tercapai dan ga ada lagi kegagalan, aamiin ya Allah.  
  
Terima kasih sudah menjadi bagian yang sangat berarti dalam hidupku.  
  
I really want u to be happy wherever u are 🤎`;  
  
function typeLetter(){  
  let i = 0;  
  const target = document.getElementById("letterText");  
  
  target.innerHTML = "";  
  
  function typing(){  
    if(i < text.length){  
      if(text.charAt(i) === "\n"){  
        target.innerHTML += "<br>";  
      } else {  
        target.innerHTML += text.charAt(i);  
      }  
      i++;  
      setTimeout(typing, 40);  
    }  
  }  
  
  typing();  
}  
  
function createFlowers(){  
  const items = ["🌸","✨","🤍","🍁","🌼","🤎"];  
  
  for(let i=0;i<35;i++){  
    const flower = document.createElement("div");  
  
    flower.className = "flower";  
    flower.innerHTML =  
      items[Math.floor(Math.random()*items.length)];  
  
    flower.style.left =  
      Math.random()*100 + "vw";  
  
    flower.style.fontSize =  
      (Math.random()*20 + 20) + "px";  
  
    flower.style.animationDuration =  
      (Math.random()*3 + 3) + "s";  
  
    document.body.appendChild(flower);  
  
    setTimeout(() => {  
      flower.remove();  
    }, 6000);  
  }  
}
let count = 5;
const countdown = document.getElementById("countdown");

document.querySelector(".envelope").style.display = "none";

const timer = setInterval(() => {
  count--;

  if (count > 0) {
    countdown.innerHTML = count;
  } else {
    countdown.innerHTML = "💌";

    setTimeout(() => {
      countdown.style.display = "none";
      document.querySelector(".envelope").style.display = "block";
    }, 2000);

    clearInterval(timer);
  }
}, 2000);
</script>  
  
</body>  
</html>
