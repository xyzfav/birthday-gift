<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body{
    background:#f8f4ee;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    font-family:Georgia, serif;
}

.envelope{
    width:300px;
    height:200px;
    background:#1f355e;
    position:relative;
    cursor:pointer;
    border-radius:8px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.flap{
    position:absolute;
    width:0;
    height:0;
    border-left:150px solid transparent;
    border-right:150px solid transparent;
    border-top:100px solid #29467a;
    transform-origin:top;
    transition:1s;
}

.letter{
    position:absolute;
    width:260px;
    height:160px;
    background:white;
    left:20px;
    top:20px;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:10px;
    box-sizing:border-box;
    transform:translateY(0);
    transition:1s;
}

.open .flap{
    transform:rotateX(180deg);
}

.open .letter{
    transform:translateY(-70px);
}
</style>
</head>

<body>

<div class="envelope" onclick="openLetter()">
    <div class="flap"></div>

    <div class="letter">
        <div>
            <h2>Happy Birthday ❤️</h2>
            <p>Click again to continue</p>
        </div>
    </div>
</div>

<script>
function openLetter(){
    document.querySelector(".envelope")
    .classList.toggle("open");
}
</script>

<audio id="music" loop>
  <source src="shapeofmyheart.mp3" type="audio/mpeg">
</audio>

<script>
document.body.addEventListener('click', function () {
  document.getElementById('music').play();
}, { once: true });
</script>

</body>
</html>
