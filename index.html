<!DOCTYPE html>  
<html>  
<head>  
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>  
  
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">  
  
<style>  
body{  
  margin:0;  
  min-height:100vh;  
  background:#dbe4f0;  
  background-image:  
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.5) 2px, transparent 2px),  
    radial-gradient(circle at 80% 70%, rgba(255,255,255,.4) 2px, transparent 2px);  
  overflow-x:hidden;  
  font-family:'Quicksand',sans-serif;  
}  
  
.envelope{
  width:96vw;
  min-height:320px;
  max-height:550px;
  height:42vw;
  background:linear-gradient(
      145deg,
      #3f5fa3,
      #27437d,
      #1e3363
  );
  border-radius:25px;
  box-shadow:0 15px 30px rgba(0,0,0,.15);
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  overflow:hidden;
  cursor:pointer;
}

.envelope::before{
  content:"✦";
  position:absolute;
  top:20px;
  left:25px;
  color:rgba(255,255,255,.45);
  font-size:20px;
}

.envelope::after{
  content:"✦";
  position:absolute;
  bottom:20px;
  right:25px;
  color:rgba(255,255,255,.45);
  font-size:20px;
}

.flap{
  position:absolute;
  width:100%;
  height:55%;
  background:linear-gradient(
      180deg,
      #4a6ab0,
      #2b467f
  );
  clip-path:polygon(0 0,100% 0,50% 100%);
  top:0;
  left:0;
  transform-origin:top;
  transition:1s;
  z-index:3;
}

.seal{
  position:absolute;
  width:55px;
  height:55px;
  border-radius:50%;
  background:linear-gradient(
      145deg,
      #f7e7a4,
      #d8b76a,
      #b88a44
  );
  left:50%;
  top:38%;
  transform:translate(-50%,-50%);
  display:flex;
  justify-content:center;
  align-items:center;
  color:#6b4f1f;
  font-size:16px;
  font-family:'Cormorant Garamond',serif;
  font-weight:700;
  z-index:4;
  box-shadow:
      inset 0 3px 6px rgba(255,255,255,.5),
      0 8px 15px rgba(0,0,0,.2);
}

.letter{
  position:absolute;
  width:74%;
  height:72%;
  left:13%;
  top:12%;
  background:linear-gradient(
      180deg,
      #faf4e6,
      #f2e4c8
  );
  border-radius:16px;
  border:2px solid #d7c2a0;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  flex-direction:column;
  padding-bottom:25px;
  box-sizing:border-box;
  text-align:center;
  transition:1.2s;
}

.letter div{
  margin-top:150px;
}

.letter h2{
  font-family:'Cormorant Garamond',serif;
  font-size:70px;
  color:#443322;
  margin-bottom:10px;
}

.letter p{
  color:#8b7761;
  font-size:10px;
}

.open .flap{
  transform:rotateX(180deg);
}

.open .letter{
  transform:translateY(-200px);
}

#message{
  display:none;
  width:88vw;
  min-height:75vh;
  margin:30px auto;
  padding:45px 25px;
  background:linear-gradient(
      180deg,
      #faf4e8,
      #f3e6cf
  );
  border-radius:35px;
  box-shadow:0 15px 35px rgba(0,0,0,.15);
  text-align:center;
}

h1{
  font-family:'Cormorant Garamond',serif;
  color:#4b3b2b;
  font-size:52px;
}

#message p{
  line-height:1.9;
  color:#5e4c3c;
  font-size:18px;
  font-style:italic;
  font-family:'Cormorant Garamond',serif;
  letter-spacing:0.5px;
}

@media(max-width:600px){
  .letter h2{
    font-size:30px;
  }

  #message p{
    font-size:16px;
  }

  h1{
    font-size:40px;
  }
}

.birthday-date{
  margin-top:-20px;
  color:#9c8768;
  font-style:italic;
  font-size:18px;
}  
.hanging-photo{
  width:100%;
  max-width:420px;
  margin:50px auto;
  text-align:center;
}
.polaroid{
  width:100%;
  max-width:380px;
  height:auto;
  display:block;
  margin:0 auto;
}
.flower{
  position:fixed;
  top:-50px;
  pointer-events:none;
  z-index:9999;
  animation:fall linear forwards;
}

@keyframes fall{
  from{
    transform:translateY(-50px) rotate(0deg);
    opacity:1;
  }
  to{
    transform:translateY(120vh) rotate(360deg);
    opacity:0;
  }
}
#countdown{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:#dbe4f0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:180px;
  color:#27437d;
  font-family:'Cormorant Garamond', serif;
  z-index:99999;
}
#openAlbumBtn{
  margin-top:30px;
  padding:15px 30px;
  border:none;
  border-radius:50px;
  background:#3f5fa3;
  color:white;
  font-size:18px;
  cursor:pointer;
}

  #album{
  margin-top:30px;
  display:none;
  text-align:center;
}

#album img{
  width:90%;
  max-width:700px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
}

#album button{
  border:none;
  background:#3f5fa3;
  color:white;
  width:45px;
  height:45px;
  border-radius:50%;
  font-size:22px;
  margin:10px;
}
#openAlbumBtn{
  box-shadow:0 8px 20px rgba(0,0,0,.15);
  transition:.3s;
}

#openAlbumBtn:hover{
  transform:scale(1.05);
}
</style>  
</head>  
  
<body>

<div id="countdown">3</div>  
  
<div class="envelope" onclick="openLetter()">  
  <div class="flap"></div>  
  
  <div class="seal">F</div>  
  
  <div class="letter">  
    <div>  
      <h2>Dear David Toga</h2>  
      <p>Open your letter ✨</p>  
    </div>  
  </div>  
</div>  
  
<div id="message">  
  <h1>Happy Birthday, My Love 🤎</h1>  
  
  <p class="birthday-date">15 July 2026 ✨</p>  
  
<p id="letterText"></p> 
  
<button id="openAlbumBtn" onclick="showAlbum()" style="display:none;">
📖 Open Our Scrapbook
</button>

<div id="album" style="display:none;">
  <button onclick="prevPage()">❮</button>

  <img id="scrapbookImage" src="cover.jpg">

  <button onclick="nextPage()">❯</button>
</div>  
  <div class="hanging-photo">  
    <div class="string"></div>  
    <img src="Untitled design.PNG" class="polaroid">  
  </div>  
</div>  
  
<audio id="music" loop>  
  <source src="Backstreet Boys - Shape Of My Heart (Official HD Video).mp3" type="audio/mpeg">  
</audio>  
  
<script>  
let opened = false;  
  
function openLetter(){
  if(opened) return;

  opened = true;

  document.querySelector(".envelope").classList.add("open");

  document.getElementById("music").play();

  setTimeout(() => {
    document.getElementById("message").style.display = "block";
    typeLetter();
    createFlowers();
  }, 2500);
  
  setTimeout(() => {
    document.querySelector(".envelope").remove();
  }, 2000);
}
  
const text = `Hi Sayangkuuu...  
  
Semoga di usia yang baru ini kamu selalu sehat,  
bahagia, dijauhkan dari orang jahat dan didekatkan sama orang-orang yang baik.  
  
Semoga tahun ini dan seterusnya semua impianmu tercapai dan ga ada lagi kegagalan, aamiin ya Allah.  
  
Terima kasih sudah menjadi bagian yang sangat berarti dalam hidupku.  
  
I really want u to be happy wherever u are 🤎`;  
  
function typeLetter(){  
  let i = 0;  
  const target = document.getElementById("letterText");  
  
  target.innerHTML = "";  
  
  function typing(){  
    if(i < text.length){  
      if(text.charAt(i) === "\n"){  
        target.innerHTML += "<br>";  
      } else {  
        target.innerHTML += text.charAt(i);  
      }  
      i++;  
      setTimeout(typing, 40);  
    } else { 
    document.getElementById("openAlbumBtn").style.display = "inline-block";
    } 
      setTimeout(() => {
      btn.style.opacity = "1";
    }, 100);
  }  
}
  
typing();  
}  
  
function createFlowers(){  
  const items = ["🌸","✨","🤍","🍁","🌼","🤎"];  
  
  for(let i=0;i<35;i++){  
    const flower = document.createElement("div");  
  
    flower.className = "flower";  
    flower.innerHTML =  
      items[Math.floor(Math.random()*items.length)];  
  
    flower.style.left =
  Math.random() * window.innerWidth + "px";
  
    flower.style.fontSize =  
      (Math.random()*20 + 20) + "px";  
  
    flower.style.animationDuration =  
      (Math.random()*3 + 3) + "s";  
  
    document.body.appendChild(flower);  
  
    setTimeout(() => {  
      flower.remove();  
    }, 6000);  
  }  
}
setTimeout(() => {
  alert(`A little surprise for you🖤
Tap anywhere to continue✨`);
}, 500);

const scrapbook = [
  "1.jpg",
  "2.jpg",
  "3.jpg",
  "4.jpg",
  "5.jpg",
  "6.jpg",
  "7.jpg",
  "8.jpg",
];

let currentPage = 0;

function showAlbum(){
  document.getElementById("album").style.display = "block";
}

function nextPage(){
  if(currentPage < scrapbook.length - 1){
    currentPage++;
    document.getElementById("scrapbookImage").src =
      scrapbook[currentPage];
  }
}

function prevPage(){
  if(currentPage > 0){
    currentPage--;
    document.getElementById("scrapbookImage").src =
      scrapbook[currentPage];
  }
}
let count = 4;
const countdown = document.getElementById("countdown");

document.querySelector(".envelope").style.visibility = "hidden";

const timer = setInterval(() => {
  count--;

  if (count > 0) {
    countdown.innerHTML = count;
  } else {
    countdown.innerHTML = "💌";

    setTimeout(() => {
  countdown.style.display = "none";
  document.querySelector(".envelope").style.visibility = "visible";
}, 2000);

    clearInterval(timer);
  }
}, 2000);
</script>  
  
</body>  
</html>
